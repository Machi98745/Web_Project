<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
    <meta charset="UTF-8">
    <title>Menu - Kitchen Station</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        html, body { background-color: #0f1729 !important; color: #f8fafc; min-height: 100vh; }
        .card { background-color: #1e293b !important; border: 1px solid #334155 !important; }
        input#searchInput { background-color: #1e293b !important; color: white !important; }
    </style>
</head>
<body class="pb-32">
    <div class="p-4 max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6 bg-slate-800 p-4 rounded-2xl border border-slate-700 shadow-md">
            <div>
                <p class="text-[10px] opacity-50 uppercase font-bold">Table</p>
                <h1 class="text-2xl font-black text-warning">#<span id="display-table">00</span></h1>
            </div>
            <div id="mini-tracker" class="text-right cursor-pointer hidden" onclick="location.href='status.html'">
                <p class="text-[10px] opacity-50 uppercase font-bold text-success">Active Order 🔥</p>
            </div>
        </div>

        <input id="searchInput" type="text" placeholder="Search menu..." class="input input-bordered w-full mb-4" />
        <div id="menu-grid" class="grid grid-cols-2 gap-4"></div>

        <footer class="fixed bottom-0 left-0 w-full p-4 bg-slate-900 border-t border-slate-800 flex justify-between items-center z-50">
            <span class="text-sm font-bold">Items: <span id="cart-count" class="text-warning">0</span></span>
            <button onclick="location.href='ordercart.html'" class="btn btn-warning rounded-full px-8">Review Tray</button>
        </footer>
    </div>
    <script src="/webtable/javascript/menu.js"></script>
</body>
</html>
