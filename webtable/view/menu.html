<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Ordering - Kitchen Station</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body>
    <div class="p-4 bg-base-200 min-h-screen pb-24" data-theme="night">
    <div class="mb-6">
        <div class="flex items-center gap-2 mb-3">
            <span class="badge badge-warning font-bold">KITCHEN STATION</span>
            <span class="text-xs opacity-50 uppercase tracking-widest">Menu</span>
        </div>
        
        <div class="join w-full shadow-lg">
            <input id="searchInput" type="text" placeholder="Search for food..." class="input join-item w-full bg-base-100 border-none focus:outline-none" />
            <button class="btn join-item btn-warning border-none">🔍</button>
        </div>
    </div>

    <div class="flex overflow-x-auto gap-2 mb-6 no-scrollbar">
        <button onclick="filterCategory('all')" class="cat-btn btn btn-sm btn-warning rounded-full px-6">All</button>
        <button onclick="filterCategory('Main Dish')" class="cat-btn btn btn-sm btn-outline rounded-full px-6">Main Dish</button>
        <button onclick="filterCategory('Drink')" class="cat-btn btn btn-sm btn-outline rounded-full px-6">Drinks</button>
    </div>

    <div id="menu-grid" class="grid grid-cols-2 gap-4"></div>
    
    <footer class="fixed bottom-0 left-0 w-full p-4 bg-base-100 border-t border-base-300 flex justify-between items-center z-50">
        <div class="flex flex-col">
            <span class="text-[10px] opacity-50 uppercase font-bold">Total</span>
            <span class="font-bold text-warning text-xl" id="total-price">0 THB</span>
        </div>
        <button onclick="location.href='ordercart.html'" class="btn btn-warning rounded-full px-8 shadow-xl font-bold">View Cart</button>
    </footer>
</div>
<script src="/project/edited/webtable/javascript/menu.js"></script>
</body>

</html>
