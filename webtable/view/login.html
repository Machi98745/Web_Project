<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kitchen Station</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        html, body { background-color: #0f1729 !important; color: #f8fafc !important; min-height: 100vh; margin:0; }
        .card { background-color: #1e293b !important; border: 1px solid #334155; }
        #tableInput { background-color: #0f1729 !important; color: #fbbf24 !important; border: 2px solid #334155 !important; }
        #tableInput::placeholder { color: #475569 !important; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="card w-full max-w-sm shadow-2xl">
        <div class="card-body items-center text-center">
            <span class="badge badge-warning font-bold mb-2 uppercase tracking-widest text-[10px]">Kitchen Station</span>
            <h2 class="card-title text-3xl mb-8 text-white font-black">Welcome</h2>
            <div class="form-control w-full">
                <label class="label"><span class="label-text opacity-50 text-slate-300">Enter Table Number</span></label>
                <input type="number" id="tableInput" placeholder="00" class="input input-bordered w-full text-center text-4xl font-black h-20" />
            </div>
            <button onclick="login()" class="btn btn-warning btn-block mt-8 h-16 text-lg font-bold shadow-lg">Start Ordering</button>
            <div class="divider opacity-10 my-6 text-xs">The past review</div>
            <button onclick="location.href='history.html'" class="btn btn-ghost btn-sm opacity-40 hover:opacity-100">View All History</button>
        </div>
    </div>
    <script src="/webtable/javascript/login.js">
      
    </script>
</body>
</html>
