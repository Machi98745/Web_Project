<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Bill - Kitchen Station</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
    /* Absolute dark background to match DaisyUI Night Theme */
    html, body {
        background-color: #0f1729 !important; /* Night theme base-200 */
        color: #f8fafc;
        min-height: 100vh;
        margin: 0;
    }
    .bg-base-100 { background-color: #1e293b !important; } /* Card background */
    .bg-base-200 { background-color: #0f1729 !important; } /* Page background */
</style>
</head>
<body class="bg-base-100">
    <div class="p-6 min-h-screen">
        <h2 class="text-xl font-bold border-b border-base-300 pb-2">Final Bill</h2>
        <div id="bill-summary" class="py-4"></div>
        <div class="text-2xl font-bold text-warning flex justify-between mt-4">
            <span>Total</span><span id="grand-total">0฿</span>
        </div>
        <button onclick="location.href='review.html'" class="btn btn-warning btn-block mt-10">Pay Now</button>
    </div>
    <script src="/webtable/javascript/payment.js"></script>
</body>
</html>
