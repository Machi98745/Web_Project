<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Tray - Kitchen Station</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* FORCE DARK THEME COLORS */
        html, body {
            background-color: #0f1729 !important; /* Dark navy */
            color: #f8fafc !important; /* White/Light Slate */
            min-height: 100vh;
        }
        .bg-base-100 { background-color: #1e293b !important; } /* Lighter navy for cards */
        
        /* Ensure the cart items are visible */
        #cart-list > div {
            background-color: #1e293b;
            border-color: #334155;
        }
    </style>
</head>
<body class="bg-base-200">
   <div class="p-4 min-h-screen flex flex-col max-w-md mx-auto">
    
    <div class="flex items-center gap-4 mb-6">
        <button onclick="location.href='menu.html'" class="btn btn-ghost btn-circle text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </button>
        <h2 class="text-2xl font-bold text-white">Your Tray</h2>
    </div>

    <div id="cart-list" class="flex-1 space-y-3 overflow-y-auto">
        <div class="text-center py-10 opacity-20 italic">Loading your tray...</div>
    </div>

    <div class="mt-6 border-t border-slate-700 pt-4 pb-4">
        <div class="flex justify-between items-center mb-4 px-2">
            <span class="text-sm opacity-50 uppercase font-bold tracking-widest">Estimated Total</span>
            <span id="total-display" class="text-xl font-bold text-warning">0฿</span>
        </div>
        <button id="order-btn" class="btn btn-warning btn-block shadow-lg font-bold text-lg h-16" disabled>
            Confirm & Place Order
        </button>
    </div>
</div>

<script src="/webtable/javascript/ordercart.js"></script>
</body>
</html>
