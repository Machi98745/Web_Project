<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        html, body { background-color: #0f1729 !important; color: #f8fafc !important; }
        .history-card { 
            background-color: #1e293b !important; 
            border: 1px solid #334155; 
            border-radius: 1rem;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body class="bg-base-200 p-6">
    <div class="max-w-md mx-auto">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="location.href='login.html'" class="btn btn-circle btn-ghost text-white">←</button>
            <h1 class="text-2xl font-bold text-white">Order History</h1>
        </div>

        <div id="history-container">
            </div>
    </div>

    <script>
        const history = JSON.parse(localStorage.getItem('kitchen_history')) || [];
        const container = document.getElementById('history-container');

        container.innerHTML = history.reverse().map(entry => `
            <div class="history-card shadow-lg">
                <div class="flex justify-between items-start mb-2">
                    <div>
                        <p class="text-[10px] uppercase opacity-40 font-bold tracking-widest">User: ${entry.userId}</p>
                        <p class="text-xl font-black text-warning">${entry.total}฿</p>
                    </div>
                    <div class="text-warning text-lg">${"★".repeat(entry.rating)}</div>
                </div>
                <div class="bg-black/20 p-2 rounded text-xs mb-3 opacity-80">
                    ${entry.items ? entry.items.join(', ') : 'Order Details N/A'}
                </div>
                <p class="text-sm italic text-slate-300">"${entry.comment || 'No comment'}"</p>
                <p class="text-[9px] mt-4 opacity-30 text-right">${entry.date}</p>
            </div>
        `).join('') || `<p class="text-center opacity-30 mt-20">No history found</p>`;
    </script>
</body>
</html>
