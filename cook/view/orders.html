<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Order</title>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

    <div class="flex flex-col min-h-screen">

        <!-- NAVBAR -->
        <div class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
            <span class="text-yellow-500 font-bold tracking-widest text-sm">KITCHEN STATION</span>
            <div class="flex gap-1 border border-gray-300 rounded-lg overflow-hidden">
                <button onclick="location.href='/cook/view/orders.html'"
                    class="px-5 py-2 font-semibold bg-gray-50 text-gray-800 border-r border-gray-200">Orders</button>
                <button onclick="location.href='/cook/view/reviews.html'"
                    class="px-5 py-2 text-gray-400 hover:bg-gray-50 hover:text-gray-700 transition-colors">Reviews</button>
                <button onclick="location.href='/cook/view/dashboard.html'"
                    class="px-5 py-2 text-gray-400 hover:bg-gray-50 hover:text-gray-700 transition-colors border-l border-gray-200">Dashboard</button>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-sm text-gray-400">Cook: <span class="text-yellow-500 font-medium"
                        id="cookName">Cook</span></span>
                <button onclick="logout()"
                    class="border border-red-400 text-red-400 hover:bg-red-50 text-xs font-medium px-3 py-1.5 rounded-lg transition-colors">Logout</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="px-6 py-4 border-b bg-white">
            <div class="flex gap-2 mt-3 flex-wrap">
                <button onclick="setTab('preparing')" id="tab-preparing"
                    class="tab px-4 py-1.5 rounded-full text-sm font-medium bg-gray-200 text-gray-600 transition-all">Preparing</button>
                <button onclick="setTab('serving')" id="tab-serving"
                    class="tab px-4 py-1.5 rounded-full text-sm font-medium bg-gray-200 text-gray-600 transition-all">Serving</button>
            </div>
            <div class="flex gap-2 mt-3 items-center flex-wrap" id="paginationControls">
                <button onclick="changePage(-1)"
                    class="px-4 py-1.5 rounded-full text-sm font-medium bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 transition-all">Prev</button>
                <span id="pageDisplay" class="text-sm text-gray-600">Page 1</span>
                <button onclick="changePage(1)"
                    class="px-4 py-1.5 rounded-full text-sm font-medium bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 transition-all">Next</button>
            </div>
        </div>

        <!-- Order List -->
        <div id="orderList" class="flex-1 overflow-y-auto px-6 py-4 bg-gray-100 grid grid-cols-3 gap-3 auto-rows-max content-start"></div>

    </div>

    <script src="/cook/public/js/orders.js"></script>
</body>

</html>
