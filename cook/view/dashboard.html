<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Dashboard</title>
</head>

<body class="min-h-screen flex flex-col bg-base-200">

    <!-- NAVBAR -->
    <div class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
        <span class="text-yellow-500 font-bold tracking-widest text-sm">KITCHEN STATION</span>
        <div class="flex gap-1 border border-gray-300 rounded-lg overflow-hidden">
            <button onclick="location.href='/cook/view/orders.html'"
                class="px-5 py-2 text-gray-400 hover:bg-gray-50 hover:text-gray-700 transition-colors">Orders</button>
            <button onclick="location.href='/cook/view/reviews.html'"
                class="px-5 py-2 text-gray-400 hover:bg-gray-50 hover:text-gray-700 border-x border-gray-200 transition-colors">Reviews</button>
            <button onclick="location.href='/cook/view/dashboard.html'"
                class="px-5 py-2 font-semibold bg-gray-50 text-gray-800">Dashboard</button>
        </div>
        <div class="flex items-center gap-3">
            <span class="text-sm text-gray-400">Cook: <span class="text-yellow-500 font-medium"
                    id="cookName">Cook</span></span>
            <button onclick="logout()"
                class="border border-red-400 text-red-400 hover:bg-red-50 text-xs font-medium px-3 py-1.5 rounded-lg transition-colors">Logout</button>
        </div>
    </div>
    <!-- Header -->
    <main class="container mx-auto px-6 py-6 space-y-6">
    <div class="flex items-center justify-between mb-2 py-3">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">Dashboard</h1>
            <p class="text-sm text-gray-400 mono mt-2">Today's performance overview</p>
        </div>
        <div class="bg-yellow-50 border border-yellow-200 rounded-xl px-4 py-2 text-sm mono text-yellow-700">
            📅 Today
        </div>
    </div>

    <!-- STAT CARDS -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="stat-card bg-white border border-gray-100 rounded-2xl p-4 shadow-sm">
            <div class="text-2xl mb-2">🍽</div>
            <div class="text-2xl font-bold text-gray-800" id="menus-served-val">-</div>
            <div class="text-xs text-gray-400 mono uppercase tracking-wider mt-1">Menus Served</div>
        </div>
        <div class="stat-card bg-white border border-gray-100 rounded-2xl p-4 shadow-sm">
            <div class="text-2xl mb-2">📋</div>
            <div class="text-2xl font-bold text-gray-800" id="orders-done-val">-</div>
            <div class="text-xs text-gray-400 mono uppercase tracking-wider mt-1">Orders Done</div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

        <!-- TOP MENUS -->
        <div class="bg-white border border-gray-100 rounded-2xl p-5 shadow-sm">
            <h2 class="text-xs mono uppercase tracking-widest text-gray-400 mb-4">🏆 Top Menu Served Today</h2>
            <div class="space-y-3" id="topMenus"></div>
        </div>

        <!-- HOURLY TREND -->
        <div class="bg-white border border-gray-100 rounded-2xl p-5 shadow-sm">
            <h2 class="text-xs mono uppercase tracking-widest text-gray-400 mb-4">📈 Orders by Hour</h2>
            <div class="space-y-2.5" id="hourlyChart"></div>
        </div>
    </div>

    <!-- RECENT SERVED ORDERS -->
    <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm">
        <h2 class="text-xs mono uppercase tracking-widest text-gray-400 mb-4">✅ Recently Served</h2>
        <div class="space-y-2" id="recentOrders"></div>
    </div>

    </main>

    <script src="/cook/public/js/dashboard.js"></script>
</body>

</html>
