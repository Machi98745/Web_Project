<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Admin Panel</title>
</head>

<body class="bg-black text-white">

    <!-- LOGIN -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center">
        <div class="w-[360px] p-10 bg-neutral border border-white/20 rounded-2xl">
            <h1 class="text-2xl text-yellow-400 mb-2">Admin</h1>
            <input id="username" class="input w-full mb-3" placeholder="admin">
            <input id="password" type="password" class="input w-full mb-3" placeholder="1234">
            <p id="login-error" class="text-red-400 text-sm hidden">Invalid login</p>
            <button onclick="doLogin()" class="btn btn-warning w-full">Login</button>
        </div>
    </div>

    <!-- APP -->
    <div id="app" class="hidden">

        <!-- SIDEBAR -->
        <aside class="fixed w-56 h-full bg-neutral border-r border-white/10">
            <div class="p-5 text-yellow-400 text-xl">Kitchen</div>
            <div class="menu">
                <a onclick="showPage('dashboard')" class="menu-item">Dashboard</a>
                <a onclick="showPage('cooks')" class="menu-item">Cooks</a>
                <a onclick="showPage('menu')" class="menu-item">Menu</a>
                <a onclick="showPage('orders')" class="menu-item">Orders</a>
            </div>
            <div class="p-3">
                <button onclick="doLogout()" class="btn btn-outline w-full">Logout</button>
            </div>
        </aside>

        <main class="ml-56 p-6">

            <!-- DASHBOARD -->
            <div id="dashboard" class="page">
                <h1 class="text-2xl mb-4">Dashboard</h1>
                <div class="grid grid-cols-4 gap-4">
                    <div class="card bg-neutral p-4">Customers: 1200</div>
                    <div class="card bg-neutral p-4">Revenue: ฿200K</div>
                    <div class="card bg-neutral p-4">Rating: 4.5</div>
                    <div class="card bg-neutral p-4">Cooks: 5</div>
                </div>
            </div>

            <!-- COOKS -->
            <div id="cooks" class="page hidden">
                <h1 class="text-xl mb-3">Cooks</h1>
                <button class="btn btn-warning mb-3" onclick="openCookModal()">Add Cook</button>
                <table class="table">
                    <tbody id="cook-list"></tbody>
                </table>
            </div>

            <!-- MENU -->
            <div id="menu" class="page hidden">
                <h1 class="text-xl mb-3">Menu</h1>
                <button class="btn btn-warning mb-3" onclick="openMenuModal()">Add Item</button>
                <table class="table">
                    <tbody id="menu-list"></tbody>
                </table>
            </div>

            <!-- ORDERS -->
            <div id="orders" class="page hidden">
                <h1 class="text-xl">Orders</h1>
                <table class="table">
                    <tbody id="order-list"></tbody>
                </table>
            </div>

        </main>
    </div>

    <!-- MODAL COOK -->
    <dialog id="cookModal" class="modal">
        <div class="modal-box">
            <input id="cookName" class="input w-full mb-3" placeholder="Name">
            <button class="btn btn-warning" onclick="addCook()">Save</button>
        </div>
    </dialog>

    <!-- MODAL MENU -->
    <dialog id="menuModal" class="modal">
        <div class="modal-box">
            <input id="itemName" class="input w-full mb-3" placeholder="Item">
            <input id="itemPrice" class="input w-full mb-3" placeholder="Price">
            <button class="btn btn-warning" onclick="addMenu()">Save</button>
        </div>
    </dialog>

    <script>
        let cooks = [];
        let menu = [];

        function doLogin() {
            if (username.value === 'admin' && password.value === '1234') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function doLogout() { location.reload(); }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(x => x.classList.add('hidden'));
            document.getElementById(p).classList.remove('hidden');
        }

        function openCookModal() { cookModal.showModal(); }
        function openMenuModal() { menuModal.showModal(); }

        function addCook() {
            cooks.push(cookName.value);
            renderCooks();
            cookModal.close();
        }

        function renderCooks() {
            document.getElementById('cook-list').innerHTML = cooks.map(c => `<tr><td>${c}</td></tr>`).join('');
        }

        function addMenu() {
            menu.push({ name: itemName.value, price: itemPrice.value });
            renderMenu();
            menuModal.close();
        }

        function renderMenu() {
            document.getElementById('menu-list').innerHTML = menu.map(m => `<tr><td>${m.name}</td><td>${m.price}</td></tr>`).join('');
        }

    </script>

</body>

</html>
