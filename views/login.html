<!DOCTYPE html>
<html lang="th" data-theme="night">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-base-200">

  <div class="card w-96 bg-base-100 shadow-2xl">
    <div class="card-body gap-4">

      <div class="flex items-center gap-2 mb-1">
        <span class="badge badge-warning">KITCHEN STATION</span>
        <span class="text-base-content/40 text-xs">Cook Portal</span>
      </div>

      <h2 class="card-title text-2xl">Login</h2>

      <fieldset class="fieldset">
        <legend class="fieldset-legend">Cook ID</legend>
        <input id="cookId" type="text" class="input w-full" placeholder="e.g. COOK-001" />
      </fieldset>

      <fieldset class="fieldset">
        <legend class="fieldset-legend">Password</legend>
        <input id="cookPass" type="password" class="input w-full" placeholder="••••••••" />
      </fieldset>

      <div id="err" class="alert alert-error hidden text-sm">
        <span>Invalid Cook ID or Password</span>
      </div>

      <div class="card-actions mt-2">
        <button class="btn btn-warning w-full" onclick="doLogin()">Enter Kitchen</button>
      </div>

      <p class="text-center text-xs text-base-content/30">Example: COOK-001 / any 4+ char password</p>

    </div>
  </div>

<script src="/public/js/login.js"></script>
</body>
</html>
