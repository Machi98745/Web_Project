<!DOCTYPE html>
<html lang="th" data-theme="night">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reviews</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen flex flex-col bg-base-200">

  <!-- NAVBAR -->
  <div class="navbar bg-base-100 border-b border-base-300 px-4">
    <div class="navbar-start">
      <span class="font-bold text-warning tracking-widest text-sm">KITCHEN STATION</span>
    </div>
    <div class="navbar-center">
      <div class="tabs tabs-box">
        <!-- <a href="orders.html" class="tab">Orders</a>  --> 
        <a href="reviews.html" class="tab tab-active">Reviews</a>
      </div>
    </div>
    <div class="navbar-end gap-3">
      <span class="text-sm text-base-content/50">Cook: <span class="text-warning font-medium" id="cookName">—</span></span>
      <button class="btn btn-sm btn-outline btn-error" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- MAIN -->
  <main class="flex-1 p-6">
    <h1 class="text-2xl font-bold mb-6">Reviews & Ratings</h1>

    <!-- STAT CARDS -->
    <div class="grid grid-cols-3 gap-4 mb-6" id="stats"></div>

    <!-- RATING BREAKDOWN -->
    <div class="card bg-base-100 mb-6">
      <div class="card-body">
        <h2 class="card-title text-sm tracking-widest uppercase text-base-content/50 mb-2">Rating Breakdown</h2>
        <div id="breakdown"></div>
      </div>
    </div>

    <!-- REVIEW CARDS -->
    <p class="text-xs tracking-widest uppercase text-base-content/40 mb-3">All Reviews</p>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="review-grid"></div>
  </main>

<script src="/public/js/reviews.js"></script>
</body>
</html>
