<!DOCTYPE html>
<html lang="en" data-theme="night">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-base-200 min-h-screen flex items-center justify-center p-4">

    <div class="card w-full max-w-md bg-base-100 shadow-2xl border border-base-300">
        <div class="card-body items-center text-center">

            <div class="flex items-center gap-2 mb-4">
                <span class="badge badge-warning font-bold">KITCHEN STATION</span>
                <span id="order-id-display" class="text-xs font-mono opacity-50">#ORD-099</span>
            </div>

            <h2 class="card-title text-2xl mb-2" id="status-heading">Tracking Order</h2>
            <p id="status-text" class="text-warning italic mb-8">Initializing...</p>

            <ul class="steps steps-vertical w-full mb-8">
                <li id="step-0" class="step">Order Received</li>
                <li id="step-1" class="step">Cooking</li>
                <li id="step-2" class="step">Meal Finished</li>
            </ul>

            <div class="card-actions w-full flex flex-col gap-2">
                <button id="bill-btn" class="btn btn-block btn-neutral" disabled>
                    Waiting for Kitchen...
                </button>

                <button onclick="location.href='menu.html'" class="btn btn-block btn-ghost btn-sm opacity-50">
                    Back to Menu
                </button>
            </div>
        </div>
    </div>

    <script src="/customer/public/js/status.js"></script>
</body>

</html>
