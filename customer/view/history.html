<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visit Summary - Kitchen Station</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-6">
    <div class="max-w-md w-full mx-auto">
        <div class="text-center mb-10">
            <div
                class="w-20 h-20 bg-amber-100 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner animate-bounce-slow">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <div
                class="inline-block bg-amber-100 text-amber-600 text-[10px] font-black px-4 py-1 rounded-full uppercase tracking-[0.2em] mb-3">
                Payment Successful
            </div>
            <h2 class="text-4xl font-black text-slate-800 tracking-tight">Thank You!</h2>
            <p class="text-slate-400 text-sm mt-2">We hope you enjoyed your meal at <span
                    class="text-amber-500 font-bold">Kitchen Station</span></p>
        </div>

        <div
            class="card bg-white shadow-xl shadow-slate-200/50 mb-4 border border-slate-100 rounded-[2.5rem] overflow-hidden transform transition-all hover:scale-[1.02]">
            <div class="card-body p-8 text-center">
                <h3 class="text-[10px] uppercase font-black text-slate-400 tracking-[0.2em] mb-2">Total Amount Paid</h3>
                <div id="payment-amount" class="text-5xl font-black text-slate-900 tracking-tighter italic">
                    0<span class="text-amber-400 ml-1 not-italic text-3xl">฿</span>
                </div>
                <div id="payment-time"
                    class="text-[10px] font-bold text-slate-300 uppercase mt-4 tracking-widest border-t border-slate-50 pt-4">
                    Loading details...
                </div>
            </div>
        </div>

        <div
            class="card bg-white shadow-lg shadow-slate-200/40 mb-10 border border-slate-100 rounded-[2.5rem] overflow-hidden">
            <div class="card-body p-8">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-[10px] uppercase font-black text-slate-400 tracking-[0.2em]">Your Experience</h3>
                    <div id="history-stars" class="text-amber-400 text-xs"></div>
                </div>
                <div class="bg-slate-50 p-6 rounded-[1.5rem] border border-slate-100 relative">
                    <span class="absolute top-2 left-3 text-4xl text-slate-200 font-serif leading-none">“</span>
                    <p id="history-comment" class="italic text-sm text-slate-600 leading-relaxed relative z-10 px-2">
                        No comment provided
                    </p>
                </div>
            </div>
        </div>

        <button onclick="finishSession()" class="group flex flex-col items-center gap-2 w-full transition-all">
            <div
                class="btn btn-ghost btn-block text-slate-400 font-black group-hover:text-red-500 transition-all uppercase text-xs tracking-[0.2em]">
                Finish Session
            </div>
            <div class="h-1 w-12 bg-slate-200 group-hover:bg-red-200 rounded-full transition-all"></div>
        </button>
    </div>

    <script src="/customer/public/js/history.js"></script>
</body>

</html>
