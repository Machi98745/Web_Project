<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review - Kitchen Station</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 text-center">
    
    <div class="card bg-white p-8 shadow-sm border border-slate-200 max-w-md w-full rounded-3xl overflow-hidden">
        
        <div class="flex justify-center mb-6">
            <span class="bg-amber-100 text-amber-600 text-[10px] font-black px-4 py-1 rounded-full uppercase tracking-widest">
                Feedback
            </span>
        </div>

        <h2 class="text-3xl font-black text-slate-800 mb-2 tracking-tight">How was your meal?</h2>
        <p class="text-sm text-slate-400 mb-8 font-medium">Please let us know your feedback below.</p>

        <div class="form-control mb-8">
            <label class="label justify-center">
                <span class="label-text text-slate-400 uppercase text-[10px] font-black tracking-[0.2em]">Write a comment</span>
            </label>
            <textarea id="comment"
                class="textarea bg-slate-50 border-slate-200 focus:border-amber-400 focus:outline-none h-32 placeholder:text-slate-300 text-slate-700 rounded-2xl p-4 transition-all"
                placeholder="Tell the chef what you liked..."></textarea>
        </div>

        <div class="mb-6">
            <label class="label">
                <span class="label-text text-slate-400 uppercase text-[10px] font-black tracking-[0.2em]">Rate your experience</span>
            </label>
            <div id="star-row" class="flex justify-center gap-2 text-2xl text-yellow-400 cursor-pointer">
                <span data-value="1">☆</span>
                <span data-value="2">☆</span>
                <span data-value="3">☆</span>
                <span data-value="4">☆</span>
                <span data-value="5">☆</span>
            </div>
        </div>

        <button onclick="submitReview()" 
            class="btn btn-lg bg-amber-400 hover:bg-amber-500 border-none text-black font-black w-full rounded-2xl shadow-xl shadow-amber-100 transition-all active:scale-95">
            Submit & Finish
        </button>

        <p class="mt-8 text-[10px] text-slate-300 uppercase font-bold tracking-widest">
            Hope to see you again soon!
        </p>
    </div>

    <script src="/customer/public/js/review.js"></script>
</body>

</html>
